# All TLDR newsletter section schemas, derived from real issue scrapes.
# Each section: id (snake_case), name (exact match), emoji, min/max blurb word
# counts, target_count (how many stories per section per day), topic_tags
# (used by the ranking model to bias scoring), description.

default: tldr_tech

tldr_tech:
  brand_name: "TLDR"
  voice_skill: tldr_tech_voice
  topics: [tech, ai, programming, data, infosec, it, fintech, startups, design]
  sections:
    - id: big_tech_startups
      name: "Big Tech & Startups"
      emoji: "📱"
      min_words: 40
      max_words: 80
      target_count: 2
      description: Major moves from FAANG, frontier labs, and funded startups. Acquisitions, layoffs, leadership shifts, big releases.
    - id: science_futuristic
      name: "Science & Futuristic Technology"
      emoji: "🚀"
      min_words: 40
      max_words: 80
      target_count: 2
      description: Hardware breakthroughs, robotics, biotech, space, energy, frontier physics. Anything outside pure software.
    - id: programming_design_data
      name: "Programming, Design & Data Science"
      emoji: "💻"
      min_words: 40
      max_words: 80
      target_count: 2
      description: Cross-cutting engineering and craft posts that aren't in a single specialty newsletter.
    - id: miscellaneous
      name: "Miscellaneous"
      emoji: "🎁"
      min_words: 40
      max_words: 80
      target_count: 2
      description: Smart essays, industry analysis, lessons, observations that don't fit a topic bucket.
    - id: quick_links
      name: "Quick Links"
      emoji: "⚡"
      min_words: 8
      max_words: 25
      target_count: 2
      description: One-sentence pointers to worthwhile reads.

tldr_ai:
  brand_name: "TLDR AI"
  voice_skill: tldr_voice
  topics: [ai, ml, llm, research]
  sections:
    - id: headlines
      name: "Headlines & Launches"
      emoji: "🚀"
      min_words: 40
      max_words: 75
      target_count: 2
      description: Frontier-lab announcements, model releases, major product ships, AI-related funding rounds, M&A.
    - id: deep_dives
      name: "Deep Dives & Analysis"
      emoji: "🧠"
      min_words: 40
      max_words: 90
      target_count: 2
      description: Think-pieces, technical posts that argue a position, deep explanations of a phenomenon, economic/strategic analysis.
    - id: engineering
      name: "Engineering & Research"
      emoji: "⚒️"
      min_words: 40
      max_words: 80
      target_count: 2
      description: Developer tools, frameworks, APIs, research papers, new techniques, infra releases.
    - id: miscellaneous
      name: "Miscellaneous"
      emoji: "🎁"
      min_words: 40
      max_words: 80
      target_count: 2
      description: Industry, geopolitics, policy, hiring, anything not fitting above.
    - id: quick_links
      name: "Quick Links"
      emoji: "⚡"
      min_words: 8
      max_words: 25
      target_count: 2
      description: Brief mentions. One sentence.

