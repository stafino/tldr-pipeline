arxiv:
  categories:
    - cs.AI
    - cs.LG
    - cs.CL
    - cs.CR   # cryptography & security
    - cs.SE   # software engineering
    - cs.DB   # databases
    - cs.HC   # human-computer interaction (design)
  max_results_per_category: 30
  lookback_hours: 48

hackernews:
  min_score: 75
  lookback_hours: 24
  # We tag every HN story with all topics since the AI relevance filter in
  # ingestion/hn.py only catches AI; for broader coverage, the ranking model
  # decides which newsletter a story fits.
